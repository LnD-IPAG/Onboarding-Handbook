<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPAG Onboarding Handbook</title>

<!-- =========================================================================
     IPAG HANDBOOK — INDEX (ENGINE) v7
     =========================================================================
     File "khung". KHÔNG sửa file này để update nội dung.
     Để sửa text, đổi ảnh, thêm khoá học → mở content.js.
     ========================================================================= -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="styles.css">
<script src="content.js"></script>
</head>
<body>

<!-- ===================== SCREEN 1: ONBOARDING / SETUP ===================== -->
<section id="onboarding-screen">
  <div class="ob-container">
    <div class="ob-left">
      <img id="welcome-logo" class="ob-logo" alt="IPA Group">
      <div class="ob-brand" style="display:none;" id="welcome-brand-fallback"><i data-lucide="compass"></i> <span id="welcome-brand"></span></div>
      <h1 class="ob-title" id="welcome-title"></h1>
      <p class="ob-desc" id="welcome-loichao" style="margin-bottom: 16px; color: var(--text-main); font-weight: 500;"></p>
      <p class="ob-desc" id="welcome-mota" style="margin-bottom: 24px;"></p>
      <div id="welcome-thu"></div>
      <p class="ob-desc" id="welcome-huongdan" style="font-style: italic; font-size: 14px;"></p>
    </div>
    <div class="ob-right" id="ob-step-container"></div>
  </div>
</section>

<!-- ===================== SCREEN 2: MAIN DASHBOARD ===================== -->
<div class="mobile-backdrop" id="mobile-backdrop" onclick="closeMobileMenu()"></div>
<section id="main-app">
  <aside class="sidebar">
    <div class="sb-header">
      <img class="sb-logo-full" id="sb-logo-full" alt="IPA Group">
      <div class="sb-logo-icon"><i data-lucide="layout-dashboard"></i></div>
      <button class="sb-toggle-btn" onclick="toggleSidebar()" aria-label="" id="sb-toggle-btn">
  <i data-lucide="panel-left-close"></i>
  <span class="toggle-label" id="sb-toggle-label"></span>
</button>
    </div>
    <nav class="sb-menu" id="sb-menu"></nav>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <button class="mobile-hamburger" onclick="openMobileMenu()" aria-label="Mở menu">
        <i data-lucide="menu"></i>
      </button>
      <div class="header-breadcrumb" id="header-title"></div>
      <div class="header-context">
        <span class="context-label" id="header-context-label"></span>
        <span class="context-value" id="header-context-val"></span>
        <button class="btn-change-context" id="btn-change-context" onclick="resetOnboarding()"></button>
      </div>
    </header>
    <div class="content-wrapper">
      <div class="content-inner animate-fade" id="module-content"></div>
    </div>
  </main>
</section>

<!-- ===================== MODAL: TIPS ===================== -->
<div class="modal-overlay" id="tips-modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Tip</h3>
      <button class="btn-close" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body" id="modal-body-content"></div>
  </div>
</div>

<!-- ===================== MODAL: IMAGE ZOOM (fullscreen) — dùng khi cần zoom ảnh khác ===================== -->
<div class="zoom-overlay" id="zoom-overlay">
  <button class="zoom-close" onclick="closeZoom()" title="Đóng"><i data-lucide="x"></i></button>
  <div class="zoom-level" id="zoom-level">100%</div>
  <div class="zoom-content" id="zoom-content">
    <img class="zoom-image" id="zoom-image" src="" alt="">
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomOut()" title="Thu nhỏ"><i data-lucide="zoom-out"></i></button>
    <button class="zoom-btn" onclick="zoomReset()" title="Khôi phục"><i data-lucide="maximize"></i></button>
    <button class="zoom-btn" onclick="zoomIn()" title="Phóng to"><i data-lucide="zoom-in"></i></button>
  </div>
</div>

<!-- =========================================================================
     ENGINE LOGIC — đọc từ content.js, render giao diện
     ========================================================================= -->
<script>

// --- STATE ---
let state = {
  sbu: null,
  khoi: null,
  currentModule: 'ipag-la-ai'  // module mặc định khi vào dashboard
};
let openAccordionId = null;     // accordion đang mở (chỉ 1 cùng lúc)

// --- INIT ---
function init() {
  // Inject text vào welcome
  document.getElementById('welcome-brand').textContent = welcomeContent.brand;
  document.getElementById('welcome-title').innerHTML = welcomeContent.tieuDe;
  document.getElementById('welcome-loichao').textContent = welcomeContent.loiChao;
  document.getElementById('welcome-mota').innerHTML = welcomeContent.moTa;
  document.getElementById('welcome-huongdan').textContent = welcomeContent.huongDan;

  // Box Thư Chủ tịch (config trong content.js — welcomeContent.thuChuTich)
  const thu = welcomeContent.thuChuTich;
  if (thu && thu.hienThi !== false) {
    document.getElementById('welcome-thu').innerHTML = `
      <div class="thu-box">
        <div class="thu-box-icon"><i data-lucide="mail-open"></i></div>
        <div class="thu-box-text">
          <div class="thu-box-title">${thu.tieuDe}</div>
          <div class="thu-box-desc">${thu.moTa}</div>
        </div>
        <button class="btn-doc-thu" onclick="openThuChuTich()">
          <i data-lucide="book-open-text"></i> ${thu.nutMo}
        </button>
      </div>
    `;
  }

  // Inject logo hoặc fallback về text/icon nếu ảnh không tải được
  const welcomeLogo = document.getElementById('welcome-logo');
  const sbLogo = document.getElementById('sb-logo-full');
  const logoSrc = uiText.appLogoImg;
  welcomeLogo.src = logoSrc;
  sbLogo.src = logoSrc;
  welcomeLogo.onerror = () => {
    welcomeLogo.style.display = 'none';
    document.getElementById('welcome-brand-fallback').style.display = 'flex';
  };
  sbLogo.onerror = () => { sbLogo.style.display = 'none'; };

  // Inject UI text
  document.getElementById('header-context-label').textContent = uiText.headerContextLabel;
  document.getElementById('btn-change-context').textContent = uiText.headerChangeBtn;
  document.getElementById('sb-toggle-btn').setAttribute('aria-label', uiText.sidebarToggleAria || 'Toggle menu');
  document.getElementById('sb-toggle-label').textContent = uiText.sidebarToggleClose;

  // Build sidebar từ menuConfig
  buildSidebar();

  // Khôi phục trạng thái sidebar collapsed (chỉ desktop)
  initSidebarState();

  lucide.createIcons();

  const saved = localStorage.getItem('ipag-handbook-state');
  if (saved) {
    state = JSON.parse(saved);
    if (state.sbu && state.khoi) {
      showDashboard();
      return;
    }
  }
  showOnboarding();
}

function buildSidebar() {
  const menuEl = document.getElementById('sb-menu');
  let html = '';
  menuConfig.forEach(group => {
    html += `<div class="menu-group-title">${group.nhom}</div>`;
    group.cacMuc.forEach(item => {
      html += `<a class="menu-item" data-module="${item.id}" title="${item.ten}" onclick="switchModule('${item.id}')"><i data-lucide="${item.icon}"></i> <span class="menu-item-text">${item.ten}</span></a>`;
    });
  });
  menuEl.innerHTML = html;
}

// --- SIDEBAR TOGGLE (desktop collapse + mobile overlay) ---
function toggleSidebar() {
  // Nút này chỉ có ở desktop (mobile dùng hamburger)
  const sidebar = document.querySelector('.sidebar');
  sidebar.classList.toggle('collapsed');
  localStorage.setItem('ipag-sidebar-collapsed', sidebar.classList.contains('collapsed'));
  updateSidebarToggleIcon();
}

function openMobileMenu() {
  document.querySelector('.sidebar').classList.add('mobile-open');
  document.getElementById('mobile-backdrop').classList.add('active');
}

function closeMobileMenu() {
  document.querySelector('.sidebar').classList.remove('mobile-open');
  document.getElementById('mobile-backdrop').classList.remove('active');
}

function updateSidebarToggleIcon() {
  const sidebar = document.querySelector('.sidebar');
  const btn = document.getElementById('sb-toggle-btn');
  const collapsed = sidebar.classList.contains('collapsed');
  btn.innerHTML = `
    <i data-lucide="${collapsed ? 'panel-left-open' : 'panel-left-close'}"></i>
    <span class="toggle-label" id="sb-toggle-label">${collapsed ? uiText.sidebarToggleOpen : uiText.sidebarToggleClose}</span>
  `;
  lucide.createIcons();
}

function initSidebarState() {
  // Chỉ apply cho desktop (>= 768px). Mobile luôn khởi tạo ở trạng thái ẩn.
  if (window.innerWidth >= 768) {
    const saved = localStorage.getItem('ipag-sidebar-collapsed');
    if (saved === 'true') {
      document.querySelector('.sidebar').classList.add('collapsed');
      updateSidebarToggleIcon();
    }
  }
}

// --- ONBOARDING ---
function showOnboarding() {
  document.getElementById('main-app').classList.remove('active');
  document.getElementById('onboarding-screen').classList.add('active');
  // Nếu chỉ có 1 SBU active → auto chọn và chuyển bước 2
  const sbuKeys = Object.keys(sbus);
  if (sbuKeys.length === 1) {
    state.sbu = sbuKeys[0];
    renderObStep2();
  } else {
    renderObStep1();
  }
}

function resetOnboarding() {
  state.sbu = null; state.khoi = null;
  localStorage.removeItem('ipag-handbook-state');
  showOnboarding();
}

function renderObStep1() {
  const container = document.getElementById('ob-step-container');
  let html = `<div class="step-title">${uiText.obStep1Title}</div><div class="grid-options">`;
  Object.keys(sbus).forEach(key => {
    const s = sbus[key];
    const isSel = state.sbu === key ? 'selected' : '';
    html += `<div class="option-card ${isSel}" onclick="selectSbu('${key}')" style="display:flex; align-items:center; justify-content:center; padding: 24px;">
               <span class="opt-code" style="margin:0; font-size:22px; text-align:center;">${s.tenDayDu}</span>
             </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
  reflow(container);
}

function selectSbu(key) {
  state.sbu = key;
  state.khoi = null;
  // Nếu SBU có cấu hình khối mặc định (khoiMacDinh) → bỏ qua bước 2, chọn thẳng khối đó
  const sbu = sbus[key];
  if (sbu.khoiMacDinh) {
    selectKhoi(sbu.khoiMacDinh);
    return;
  }
  renderObStep2();
}

function renderObStep2() {
  const container = document.getElementById('ob-step-container');
  const sbu = sbus[state.sbu];
  const onlyOneSbu = Object.keys(sbus).length === 1;
  let html = `<div class="step-title">${uiText.obStep2Title} ${sbu.tenDayDu}?</div><div class="grid-options">`;
  Object.entries(sbu.khoi).forEach(([k, name]) => {
    const isSel = state.khoi === k ? 'selected' : '';
    html += `<div class="option-card ${isSel}" onclick="selectKhoi('${k}')">
               <span class="opt-code">${name}</span>
             </div>`;
  });
  html += `</div>`;
  // Nút quay lại chỉ hiện khi có >1 SBU
  if (!onlyOneSbu) {
    html += `<div style="margin-top: 32px;">
               <button class="btn btn-outline" onclick="renderObStep1()"><i data-lucide="arrow-left" style="width:16px; margin-right:6px;"></i> ${uiText.obBackButton}</button>
             </div>`;
  }
  container.innerHTML = html;
  lucide.createIcons();
  reflow(container);
}

function selectKhoi(k) {
  state.khoi = k;
  finishOnboarding();
}

function finishOnboarding() {
  if (!state.sbu || !state.khoi) return;
  localStorage.setItem('ipag-handbook-state', JSON.stringify(state));
  showDashboard();
}

function reflow(el) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeIn 0.3s ease-out';
}

// --- DASHBOARD ---
function showDashboard() {
  document.getElementById('onboarding-screen').classList.remove('active');
  document.getElementById('main-app').classList.add('active');
  updateHeaderContext();
  switchModule(state.currentModule);
}

function updateHeaderContext() {
  const sbuName = sbus[state.sbu]?.tenDayDu || state.sbu;
  const khoiName = sbus[state.sbu]?.khoi[state.khoi] || state.khoi;
  document.getElementById('header-context-val').textContent = `${sbuName} - ${khoiName}`;
}

// Tìm tên module trong menuConfig
function getModuleTitle(id) {
  for (const g of menuConfig) {
    for (const m of g.cacMuc) {
      if (m.id === id) return m.ten;
    }
  }
  return id;
}

function switchModule(moduleId) {
  state.currentModule = moduleId;
  localStorage.setItem('ipag-handbook-state', JSON.stringify(state));
  openAccordionId = null;  // reset accordion state khi chuyển module

  // Auto-đóng mobile menu sau khi user chọn module
  if (window.innerWidth < 768) closeMobileMenu();

  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  const activeMenuItem = document.querySelector(`.menu-item[data-module="${moduleId}"]`);
  if (activeMenuItem) activeMenuItem.classList.add('active');
  document.getElementById('header-title').textContent = getModuleTitle(moduleId);

  const contentDiv = document.getElementById('module-content');
  contentDiv.classList.remove('animate-fade');
  contentDiv.offsetHeight;
  contentDiv.classList.add('animate-fade');
  // Reset scroll lên đầu khi chuyển module
  document.querySelector('.content-wrapper').scrollTop = 0;

  const renderMap = {
    'ipag-la-ai':  renderIPAGModule,
    'vai-tro':     renderVaiTroModule,
    'epic':        renderEpicModule,
    'lo-trinh':    renderLoTrinhModule,
    'dao-tao':     renderDaoTaoModule,
    'quy-dinh':    renderQuyDinhModule,
    'nguon-luc':   renderNguonLucModule,
    'glossary':    renderGlossaryModule,
    'faq':         renderFaqModule
  };
  const fn = renderMap[moduleId] || renderPlaceholder;
  fn(contentDiv, moduleId);

  lucide.createIcons();
}

// =============================================================================
// HELPERS
// =============================================================================

// Hero card chung cho mọi module
function renderHero(tieuDe, moTa, tipId, extraHtml = '') {
  return `
    <div class="module-hero">
      <div class="module-hero-head">
        <div>
          <h1>${tieuDe}</h1>
          <p>${moTa}</p>
        </div>
        ${tipId ? `<button class="btn-tip-hero" onclick="openTip('${tipId}')">
          <i data-lucide="lightbulb"></i> ${uiText.tipButton}
        </button>` : ''}
      </div>
      ${extraHtml}
    </div>
  `;
}

// Toggle 1 accordion item (chỉ 1 mở cùng lúc)
function toggleMacc(id) {
  const item = document.getElementById(id);
  if (!item) return;
  if (openAccordionId && openAccordionId !== id) {
    const prev = document.getElementById(openAccordionId);
    if (prev) prev.classList.remove('expanded');
  }
  item.classList.toggle('expanded');
  openAccordionId = item.classList.contains('expanded') ? id : null;
  // Scroll item vào view
  if (item.classList.contains('expanded')) {
    setTimeout(() => item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 200);
  }
}

// =============================================================================
// MODULE: IPAG LÀ AI?
// =============================================================================
function renderIPAGModule(container) {
  const statsHtml = `<div class="stats-grid">
    ${iPAGContent.conSo.map(s => `
      <div class="stat-card">
        <i data-lucide="${s.icon}"></i>
        <div class="stat-num">${s.soLieu}</div>
        <div class="stat-label">${s.nhan}</div>
      </div>
    `).join('')}
  </div>`;

  const phanHtml = iPAGContent.cacPhan.map((phan, idx) => {
    const itemId = `ipag-phan-${idx}`;
    let bodyExtra = '';

    // Phần có IPAG Way -> render 4 chữ
    if (phan.ipagWay) {
      bodyExtra += `<div class="ipag-way-grid">
        ${phan.ipagWay.map(w => `
          <div class="ipag-way-card">
            <div><span class="ipag-way-letter">${w.chu}</span> <span class="ipag-way-title">${w.tieuDe}</span></div>
            <div class="ipag-way-subtitle">${w.phuDe}</div>
            <div class="ipag-way-text">${w.noiDung}</div>
          </div>
        `).join('')}
      </div>`;
    }

    // Phần có 4 hạ tầng -> render cards
    if (phan.hangTang) {
      bodyExtra += `<div class="hatang-grid">
        ${phan.hangTang.map(h => `
          <div class="hatang-card">
            <div class="hatang-head"><i data-lucide="${h.icon}"></i> <span class="hatang-name">${h.ten}</span></div>
            <div class="hatang-sub">${h.phuDe}</div>
            <div class="hatang-desc">${h.noiDung}</div>
          </div>
        `).join('')}
      </div>`;
    }

    // Phần có nhóm nền tảng (nhịp Hai) -> mỗi nhóm: tiêu đề + grid card
    if (phan.nhomNen) {
      bodyExtra += phan.nhomNen.map(nhom => `
        <div class="vt-section-title" style="margin-top: 16px;">
          <i data-lucide="layers"></i> ${nhom.tieuDe}
        </div>
        <div class="hatang-grid">
          ${nhom.cards.map(h => `
            <div class="hatang-card">
              <div class="hatang-head"><i data-lucide="${h.icon}"></i> <span class="hatang-name">${h.ten}</span></div>
              <div class="hatang-sub">${h.phuDe}</div>
              <div class="hatang-desc">${h.noiDung}</div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    // Phần lịch sử -> render timeline dọc
    if (phan.mocLichSu) {
      bodyExtra += `<div class="lichsu-list">
        ${phan.mocLichSu.map(m => `
          <div class="lichsu-item">
            <div class="lichsu-year">${m.nam}</div>
            <div class="lichsu-title">${m.tieuDe}</div>
            <div class="lichsu-desc">${m.moTa}</div>
          </div>
        `).join('')}
      </div>`;
    }

    return `
      <div class="macc-item" id="${itemId}">
        <div class="macc-head" onclick="toggleMacc('${itemId}')">
          <div class="macc-icon"><i data-lucide="${phan.icon}"></i></div>
          <div class="macc-title-wrap">
            <div class="macc-title">${phan.tieuDe}</div>
          </div>
          <i data-lucide="chevron-down" class="macc-chevron"></i>
        </div>
        <div class="macc-body">
          <p>${phan.noiDung}</p>
          ${bodyExtra}
          ${phan.ketLuan ? `<div class="vt-nguyentac"><i data-lucide="quote"></i> <em>${phan.ketLuan}</em></div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  container.innerHTML = renderHero(iPAGContent.tieuDe, iPAGContent.moTa, 'ipag-la-ai', statsHtml) +
                        `<div class="module-accordion">${phanHtml}</div>`;
}

// =============================================================================
// MODULE: VAI TRÒ CỦA BẠN
// Schema: theoKhoi (nếu có, ở TRÊN) + chung.nguyenLy (ở DƯỚI).
// Nguyên lý có `noiDungMoRong` sẽ render dạng full-width phía dưới grid 2×2.
// =============================================================================
function renderVaiTroModule(container) {
  // 1. PHẦN RIÊNG THEO KHỐI (nếu có)
  const rieng = vaiTroContent.theoKhoi?.[state.khoi];
  let rieUngHtml = '';
  if (rieng) {
    const bangHtml = rieng.bang ? renderBangSimple(rieng.bang) : '';
    rieUngHtml = `
      <div class="vt-rieng">
        <div class="vt-rieng-head"><i data-lucide="user-round-check"></i> <h2>${rieng.tieuDe}</h2></div>
        <div class="vt-rieng-body">
          <p>${rieng.dienGiai}</p>
          ${bangHtml}
          ${rieng.nguyenTac ? `<div class="vt-nguyentac"><i data-lucide="quote"></i> <em>${rieng.nguyenTac}</em></div>` : ''}
        </div>
      </div>
    `;
  }

  // 2. PHẦN CHUNG — chia nguyên lý thành 2 nhóm:
  //    a) Card đơn giản (không có noiDungMoRong) → grid 2×2
  //    b) Card mở rộng (có noiDungMoRong) → full-width phía dưới
  // Ẩn nhóm nguyên lý chung (card đơn giản) với các khối khai báo trong
  // vaiTroContent.anNguyenLyChoKhoi. Card mở rộng (Vai trò lãnh đạo) luôn hiển thị.
  const anNguyenLy = (vaiTroContent.anNguyenLyChoKhoi || []).includes(state.khoi);
  const nguyenLyThuong = anNguyenLy ? [] : vaiTroContent.chung.nguyenLy.filter(n => !n.noiDungMoRong);
  const nguyenLyMoRong = vaiTroContent.chung.nguyenLy.filter(n =>  n.noiDungMoRong);

  const cardsHtml = nguyenLyThuong.map(n => `
    <div class="nguyenly-card">
      <div class="nguyenly-icon"><i data-lucide="${n.icon}"></i></div>
      <h3>${n.tieuDe}</h3>
      <p>${n.noiDung}</p>
    </div>
  `).join('');

  const moRongHtml = nguyenLyMoRong.map(n => {
    const mr = n.noiDungMoRong;
    return `
      <div class="nguyenly-card nguyenly-full">
        <div class="nguyenly-full-head">
          <div class="nguyenly-icon"><i data-lucide="${n.icon}"></i></div>
          <div>
            <h3>${n.tieuDe}</h3>
            ${n.phuDe ? `<div class="nguyenly-phude">${n.phuDe}</div>` : ''}
          </div>
        </div>
        <p>${n.noiDung}</p>
        ${mr.bang ? renderBangSimple(mr.bang) : ''}
        ${mr.thaoLuan ? `
          <div class="vt-thaoluan">
            <h4>${mr.thaoLuan.tieuDe}</h4>
            <p>${mr.thaoLuan.noiDung}</p>
          </div>` : ''}
        ${mr.nguyenTac ? `<div class="vt-nguyentac"><i data-lucide="quote"></i> <em>${mr.nguyenTac}</em></div>` : ''}
      </div>
    `;
  }).join('');

  // 3. Section header "Nguyên lý chung" (chỉ hiện khi có phần riêng ở trên VÀ nhóm nguyên lý không bị ẩn)
  const chungHeader = (rieng && nguyenLyThuong.length > 0) ? `
    <div class="vt-section-title">
      <i data-lucide="layers"></i> Nguyên lý chung của IPAG
    </div>` : '';

  container.innerHTML =
    renderHero(vaiTroContent.tieuDe, vaiTroContent.moTa, 'vai-tro') +
    rieUngHtml +

function parseTipText(text) {
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  const lines = text.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line === '') { i++; continue; }
    if (/^\d+\.\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) {
        items.push(lines[i].trim().replace(/^\d+\.\s/, ''));
        i++;
      }
      html += '<ol style="padding-left: 20px; margin-bottom: 16px;">' +
              items.map(it => `<li>${it}</li>`).join('') + '</ol>';
    } else if (/^-\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^-\s/.test(lines[i].trim())) {
        items.push(lines[i].trim().replace(/^-\s/, ''));
        i++;
      }
      html += '<ul style="padding-left: 20px; margin-bottom: 16px;">' +
              items.map(it => `<li>${it}</li>`).join('') + '</ul>';
    } else {
      html += `<p style="margin-bottom: 12px;">${line}</p>`;
      i++;
    }
  }
  return html;
}

function openTip(moduleId) {
  const tip = globalTips[moduleId];
  if (!tip) {
    alert("Tip cho phần này đang được biên tập và sẽ sớm ra mắt!");
    return;
  }
  document.getElementById('modal-title').textContent = tip.tieuDe;
  let html = parseTipText(tip.noiDung);
  if (tip.anh) {
    html += `<img src="${tip.anh}" onerror="this.src='https://via.placeholder.com/600x300?text=Image+Placeholder'" alt="Minh hoạ" style="width:100%; border-radius:8px; margin-top:16px; border:1px solid var(--border);">`;
  }
  document.getElementById('modal-body-content').innerHTML = html;
  document.getElementById('tips-modal').classList.add('active');
}

// =============================================================================
// MODAL: IMAGE ZOOM (giữ lại — dùng khi cần zoom ảnh trong tương lai)
// =============================================================================
let zoomState = { scale: 1, panX: 0, panY: 0, isDragging: false, startX: 0, startY: 0 };

function openZoom(imgSrc) {
  const img = document.getElementById('zoom-image');
  img.src = imgSrc;
  zoomState = { scale: 1, panX: 0, panY: 0, isDragging: false, startX: 0, startY: 0 };
  applyZoom();
  document.getElementById('zoom-overlay').classList.add('active');
  setTimeout(() => lucide.createIcons(), 0);
}

function closeZoom() {
  document.getElementById('zoom-overlay').classList.remove('active');
}

function zoomIn()    { zoomState.scale = Math.min(zoomState.scale * 1.25, 5); applyZoom(); }
function zoomOut()   { zoomState.scale = Math.max(zoomState.scale / 1.25, 0.5); applyZoom(); }
function zoomReset() { zoomState = { scale: 1, panX: 0, panY: 0, isDragging: false, startX: 0, startY: 0 }; applyZoom(); }

function applyZoom() {
  const img = document.getElementById('zoom-image');
  img.style.transform = `translate(${zoomState.panX}px, ${zoomState.panY}px) scale(${zoomState.scale})`;
  document.getElementById('zoom-level').textContent = Math.round(zoomState.scale * 100) + '%';
}

// Pan với chuột khi đã zoom
document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('zoom-content');
  content.addEventListener('mousedown', e => {
    if (zoomState.scale <= 1) return;
    zoomState.isDragging = true;
    zoomState.startX = e.clientX - zoomState.panX;
    zoomState.startY = e.clientY - zoomState.panY;
    content.classList.add('dragging');
  });
  document.addEventListener('mousemove', e => {
    if (!zoomState.isDragging) return;
    zoomState.panX = e.clientX - zoomState.startX;
    zoomState.panY = e.clientY - zoomState.startY;
    applyZoom();
  });
  document.addEventListener('mouseup', () => {
    zoomState.isDragging = false;
    content.classList.remove('dragging');
  });
  // Scroll wheel zoom
  content.addEventListener('wheel', e => {
    if (!document.getElementById('zoom-overlay').classList.contains('active')) return;
    e.preventDefault();
    if (e.deltaY < 0) zoomIn(); else zoomOut();
  }, { passive: false });
  // Esc để đóng modal/zoom/pdf
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('zoom-overlay').classList.contains('active')) closeZoom();
      else if (document.getElementById('tips-modal').classList.contains('active')) closeModal();
    }
  });
});

// Khởi chạy
init();
</script>
</body>
</html>
